buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.24"

        minSdkVersion = 23
        targetSdkVersion = 35
        compileSdkVersion = 35
        appCompatVersion 	= "1.4.2"      // Or higher.  Required for new AndroidX compatibility.
        googlePlayServicesLocationVersion = "21.0.1"  // Or higher.
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    classpath 'com.google.gms:google-services:4.3.15'

    }
}

allprojects {
    repositories {
         mavenCentral()
        mavenLocal()
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            url("$rootDir/../node_modules/jsc-android/dist")
        }
       

        google()
        maven { url 'https://www.jitpack.io' }
        maven { url 'https://plugins.gradle.org/m2/' }
        maven { url 'https://oss.sonatype.org/content/repositories/snapshots' }
       
    }

    subprojects {
        configurations.all {
            resolutionStrategy.eachDependency { details ->
                if (details.requested.group == "androidx.work") {
                    details.useVersion "2.8.0"   // force unified version
                }
            }
        }
    }
    }

apply plugin: "com.facebook.react.rootproject"
